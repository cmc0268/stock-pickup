name: scan

# 자동 스캔 (한국시간 KST = UTC+9)
#  08:50 KST = 23:50 UTC (전날)
#  12:00 KST = 03:00 UTC
#  15:20 KST = 06:20 UTC
#  20:00 KST = 11:00 UTC
on:
  schedule:                    # GitHub 자체 스케줄 (지연 잦음 — 백업용)
    - cron: "50 23 * * 0-4"   # 08:50 KST (월~금: UTC 일~목)
    - cron: "0 3 * * 1-5"     # 12:00 KST
    - cron: "20 6 * * 1-5"    # 15:20 KST
    - cron: "0 11 * * 1-5"    # 20:00 KST
  workflow_dispatch:           # 수동 실행 버튼
  repository_dispatch:         # 외부 스케줄러(cron-job.org) 호출용
    types: [run-scan]

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install finance-datareader pandas

      - name: Run scan
        env:
          TOP_KOSPI: "380"
          TOP_KOSDAQ: "420"
          MAX_WORKERS: "24"
        run: |
          # 스캔 실패(데이터 수신 부족) 시 기존 picks.json 보존하고 비정상 종료(exit 1).
          # 그 경우에도 워크플로는 계속 진행하되 커밋 단계에서 변경 없음으로 끝남.
          python scan_job.py || echo "scan_skipped=1" >> "$GITHUB_ENV"

      - name: Note (skipped)
        if: env.scan_skipped == '1'
        run: echo "데이터 수신 부족으로 이번 스캔은 건너뜀 — 기존 결과 보존됨"

      - name: Commit results
        run: |
          git config user.name  "scan-bot"
          git config user.email "scan-bot@users.noreply.github.com"
          git add data/picks.json
          if git diff --cached --quiet; then
            echo "변경 없음 — 커밋 건너뜀"
          else
            git commit -m "scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
